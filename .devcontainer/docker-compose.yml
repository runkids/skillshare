# Devcontainer-only service: no profile restriction, stays alive for VS Code attach.
# Reuses the same Dockerfile and volume setup as sandbox-dev.
name: skillshare_devcontainer

services:
  skillshare-devcontainer:
    build:
      context: ..
      dockerfile: docker/sandbox/Dockerfile
    working_dir: /workspace
    command: sleep infinity
    environment:
      HOME: /home/developer
      # virtiofs doesn't reliably deliver inotify events, so Vite/Docusaurus
      # miss file saves. Force polling-based file watching inside the container.
      CHOKIDAR_USEPOLLING: "true"
      GOCACHE: /go/build-cache
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITLAB_TOKEN: ${GITLAB_TOKEN:-}
      BITBUCKET_TOKEN: ${BITBUCKET_TOKEN:-}
      BITBUCKET_USERNAME: ${BITBUCKET_USERNAME:-}
      SKILLSHARE_GIT_TOKEN: ${SKILLSHARE_GIT_TOKEN:-}
    ports:
      - "5173:5173"
      - "19420:19420"
      - "8888:8888"
    volumes:
      - ..:/workspace
      # Container-local node_modules (anonymous volumes) so platform-native
      # bindings (e.g. @rolldown/binding-linux-*) are installed inside the
      # container instead of inheriting the host's darwin bindings via the
      # virtiofs bind mount above. Without this, vite 8 / rolldown fails to load.
      - /workspace/ui/node_modules
      - /workspace/website/node_modules
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/go/build-cache
      - dev-home:/home/developer
    security_opt:
      - no-new-privileges:true

volumes:
  go-mod-cache:
  go-build-cache:
  dev-home:
